name: Deploy to server

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Python syntax
        run: python -m py_compile main.py prompts.py db.py sync_manager.py

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /opt/emet-bot
            git pull origin main
            # Маркер деплою — бот побачить його при старті і надішле правильне повідомлення
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > data/deploy_marker.txt
            docker compose up --build -d
            docker image prune -f
