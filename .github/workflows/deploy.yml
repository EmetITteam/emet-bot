name: Deploy to server

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Python syntax
        run: python -m py_compile main.py prompts.py db.py sync_manager.py

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd /opt/emet-bot

            # 1. Stash local changes (file mode bits, untracked artifacts) щоб git pull не падав
            git stash --include-untracked 2>&1 | tail -2 || true
            git pull origin main 2>&1 | tail -3
            git stash drop 2>/dev/null || true

            # 2. Маркер деплою — бот побачить його при старті і надішле правильне повідомлення
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > data/deploy_marker.txt

            # 3. Build перед стопом — щоб простой був мінімальний
            docker compose build emet-bot emet-admin

            # 4. Чистий restart: видалити container'и явно (уникнути zombie у статусі Created)
            # При швидкому --build контейнер може застрягти між "Stopping" і "Created" — блокує recreation
            docker rm -f emet_bot_app emet_admin_panel 2>/dev/null || true

            # 5. Підняти заново з готовим image (швидко) + видалити orphan-контейнери
            docker compose up -d --remove-orphans

            # 6. Чистка старих image
            docker image prune -f

            # 7. Sanity check — підтвердити що обидва контейнери Up
            sleep 5
            docker ps --filter name=emet_bot_app --filter name=emet_admin_panel --format '{{.Names}}\t{{.Status}}'
